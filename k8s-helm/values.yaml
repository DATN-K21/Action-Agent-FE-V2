# Default values for frontend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: myaagent.azurecr.io/frontend
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "BuildId"

# Environment variables
env:
  # Placeholder

imagePullSecrets: 
  - name: regcred
nameOverride: "frontend"
fullnameOverride: "frontend"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: ""
  annotations: 
    spec.ingressClassName: "nginx"
  hosts:
    - host: dev.action-agent.com
      paths:
        - path: /
          pathType: Prefix
  tls: 
   - secretName: frontend-tls
     hosts:
       - dev.action-agent.com

resources: 
  requests:
    cpu: "10m"
    memory: "100Mi"
  limits:
    cpu: "300m"
    memory: "500Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - aagent-stg-fe-wapp

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://aagent.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_9a2b17fd3109495d8f699b0017a76329 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_4bb26ced96094831bf710d2ab63a7c0f }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: aagent.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_9a2b17fd3109495d8f699b0017a76329 }}/action-agent-fe:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'aagent-stg-fe-wapp'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_ca17c18382bf4270a61055d724c0ede9 }}
        images: 'aagent.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_9a2b17fd3109495d8f699b0017a76329 }}/action-agent-fe:${{ github.sha }}'